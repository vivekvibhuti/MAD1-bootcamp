<!doctype html>
<html>
    <head>
        <title>All Users</title>
    </head>
    <body>
        <h1>All Users</h1>
        <ul>
            {% for user in users %}
            <li>{{ user.username }}</li>
            <!--view user -->
            <a href="{{ url_for('user', user_id=user.id) }}">View User</a>
            <br />

            <!-- delete <button type="button">Button</button>-->
            <form
                action="{{ url_for('delete_user', user_id=user.id) }}"
                method="post"
            >
                <button type="submit">Delete</button>
            </form>
            {% endfor %}
        </ul>
    </body>
</html>
