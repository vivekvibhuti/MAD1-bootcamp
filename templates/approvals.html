<!doctype html>
<html>
    <head>
        <title>Pending Approvals</title>
    </head>
    <body>
        <h1>Pending Store Manager Approvals</h1>
        {% if pending %}
        <table border="1">
            <thead>
                <tr>
                    <th>Username</th>
                    <th>Role</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                {% for user in pending %}
                <tr>
                    <td>{{ user.username }}</td>
                    <td>{{ user.role }}</td>
                    <td>
                        <form style="display:inline" action="/admin/approve/{{ user.id }}" method="post">
                            <button type="submit">Approve</button>
                        </form>
                        <form style="display:inline" action="/admin/reject/{{ user.id }}" method="post">
                            <button type="submit">Reject</button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        {% else %}
        <p>No pending approvals.</p>
        {% endif %}
        <a href="/dashboard">Back to Dashboard</a>
    </body>
</html>
